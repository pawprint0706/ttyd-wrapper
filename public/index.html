/**
 *  Default styles for xterm.js
 */

.xterm {
    cursor: text;
    position: relative;
    user-select: none;
    -ms-user-select: none;
    -webkit-user-select: none;
}

.xterm.focus,
.xterm:focus {
    outline: none;
}

.xterm .xterm-helpers {
    position: absolute;
    top: 0;
    /**
     * The z-index of the helpers must be higher than the canvases in order for
     * IMEs to appear on top.
     */
    z-index: 5;
}

.xterm .xterm-helper-textarea {
    padding: 0;
    border: 0;
    margin: 0;
    /* Move textarea out of the screen to the far left, so that the cursor is not visible */
    position: absolute;
    opacity: 0;
    left: -9999em;
    top: 0;
    width: 0;
    height: 0;
    z-index: -5;
    /** Prevent wrapping so the IME appears against the textarea at the correct position */
    white-space: nowrap;
    overflow: hidden;
    resize: none;
}

.xterm .composition-view {
    /* TODO: Composition position got messed up somewhere */
    background: #000;
    color: #FFF;
    display: none;
    position: absolute;
    white-space: nowrap;
    z-index: 1;
}

.xterm .composition-view.active {
    display: block;
}

.xterm .xterm-viewport {
    /* On OS X this is required in order for the scroll bar to appear fully opaque */
    background-color: #000;
    overflow-y: scroll;
    cursor: default;
    position: absolute;
    right: 0;
    left: 0;
    top: 0;
    bottom: 0;
}

.xterm .xterm-screen {
    position: relative;
}

.xterm .xterm-screen canvas {
    position: absolute;
    left: 0;
    top: 0;
}

.xterm .xterm-scroll-area {
    visibility: hidden;
}

.xterm-char-measure-element {
    display: inline-block;
    visibility: hidden;
    position: absolute;
    top: 0;
    left: -9999em;
    line-height: normal;
}

.xterm.enable-mouse-events {
    /* When mouse events are enabled (eg. tmux), revert to the standard pointer cursor */
    cursor: default;
}

.xterm.xterm-cursor-pointer,
.xterm .xterm-cursor-pointer {
    cursor: pointer;
}

.xterm.column-select.focus {
    /* Column selection mode */
    cursor: crosshair;
}

.xterm .xterm-accessibility,
.xterm .xterm-message {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    right: 0;
    z-index: 10;
    color: transparent;
    pointer-events: none;
}

.xterm .live-region {
    position: absolute;
    left: -9999px;
    width: 1px;
    height: 1px;
    overflow: hidden;
}

.xterm-dim {
    /* Dim should not apply to background, so the opacity of the foreground color is applied
     * explicitly in the generated class and reset to 1 here */
    opacity: 1 !important;
}

.xterm-underline-1 { text-decoration: underline; }
.xterm-underline-2 { text-decoration: double underline; }
.xterm-underline-3 { text-decoration: wavy underline; }
.xterm-underline-4 { text-decoration: dotted underline; }
.xterm-underline-5 { text-decoration: dashed underline; }

.xterm-overline {
    text-decoration: overline;
}

.xterm-overline.xterm-underline-1 { text-decoration: overline underline; }
.xterm-overline.xterm-underline-2 { text-decoration: overline double underline; }
.xterm-overline.xterm-underline-3 { text-decoration: overline wavy underline; }
.xterm-overline.xterm-underline-4 { text-decoration: overline dotted underline; }
.xterm-overline.xterm-underline-5 { text-decoration: overline dashed underline; }

.xterm-strikethrough {
    text-decoration: line-through;
}

.xterm-screen .xterm-decoration-container .xterm-decoration {
	z-index: 6;
	position: absolute;
}

.xterm-screen .xterm-decoration-container .xterm-decoration.xterm-decoration-top-layer {
	z-index: 7;
}

.xterm-decoration-overview-ruler {
    z-index: 8;
    position: absolute;
    top: 0;
    right: 0;
    pointer-events: none;
}

.xterm-decoration-top {
    z-index: 2;
    position: relative;
}

<style>
  :root {
    --toolbar-h: 44px;
    --toolbar-bg: #1a1a2e;
    --toolbar-fg: #e0e0e0;
    --btn-bg: #2d2d44;
    --btn-hover: #3d3d5c;
    --btn-active: #4a4a8a;
    --ctrl-active: #c0392b;
    --accent: #5b9bd5;
    --danger: #e74c3c;
    --font-size: 14px;
    --gap: 6px;
    --radius: 4px;
    --transition: 0.15s ease;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #0d0d19;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Layout ── */
  body {
    display: flex;
    flex-direction: column;
  }

  #terminal-container {
    flex: 1;
    min-height: 0;
    padding: 2px;
    background: #0d0d19;
    touch-action: none;
  }

  #terminal-container .xterm {
    height: 100%;
  }

  /* ── Toolbar ── */
  #toolbar {
    display: flex;
    flex-direction: column;
    background: var(--toolbar-bg);
    border-top: 1px solid #2a2a4a;
    user-select: none;
    -webkit-user-select: none;
    padding-bottom: var(--safe-bottom);
  }

  .toolbar-row {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 4px;
  }

  /* ── Buttons ── */
  button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 0;
    height: 40px;
    padding: 0 4px;
    border: 1px solid #3a3a5a;
    border-radius: var(--radius);
    background: var(--btn-bg);
    color: var(--toolbar-fg);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: background var(--transition), border-color var(--transition), transform var(--transition);
    white-space: nowrap;
    touch-action: manipulation;
  }

  button:active,
  button.pressed {
    background: var(--btn-active);
    transform: scale(0.95);
  }

  button.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.danger { background: var(--danger); border-color: var(--danger); color: #fff; }
  /* Sticky modifier armed */
  button.active { background: var(--ctrl-active); border-color: #e74c3c; }
  /* Toggle on: Fn / mode / keyboard */
  button.on { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Special-key rows ── */
  .keys-row button { flex: 1 1 0; padding: 0 2px; }

  /* Layer visibility: base rows by default, F-key rows when .fn-layer */
  .keys-row { display: none; }
  #toolbar[data-mode="keys"] .keys-row.layer-base { display: flex; }
  #toolbar[data-mode="keys"].fn-layer .keys-row.layer-base { display: none; }
  #toolbar[data-mode="keys"].fn-layer .keys-row.layer-fn { display: flex; }

  /* ── Bottom persistent row ──
     #mode-area, #cluster, and the active pane are flattened (display:
     contents) so every control is a direct flex item of #row-bottom and
     shares one equal-width grid, like the key rows above. */
  #mode-area, #cluster { display: contents; }
  .mode-pane { display: none; }
  #toolbar[data-mode="keys"] .mode-pane[data-pane="keys"],
  #toolbar[data-mode="settings"] .mode-pane[data-pane="settings"],
  #toolbar[data-mode="select"] .mode-pane[data-pane="select"] { display: contents; }
  #row-bottom button { flex: 1 1 0; padding: 0 2px; }
  /* Desktop (non-mobile UA): no soft keyboard — hide its button */
  body.no-mobile #kb-btn { display: none; }

  /* ── Font size display ── */
  .font-display {
    min-width: 30px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--toolbar-fg);
  }

  /* ── Separator ── */
  .sep {
    width: 1px;
    height: 24px;
    background: #3a3a5a;
    margin: 0 2px;
    flex-shrink: 0;
  }

  /* ── Status ── */
  #status {
    font-size: 11px;
    color: #888;
    padding: 0 2px;
  }
  #status.connected { color: #2ecc71; }
  #status.disconnected { color: #e74c3c; }

  /* ── Collapse toggle (bottom-right of terminal area, above toolbar) ── */
  #terminal-container { position: relative; }
  #toggle-btn {
    position: absolute;
    bottom: 8px;
    right: 8px;
    z-index: 100;
    width: 36px;
    height: 36px;
    min-width: 36px;
    border-radius: 50%;
    background: var(--btn-bg);
    border: 1px solid #3a3a5a;
    color: var(--toolbar-fg);
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity var(--transition);
  }
  #toggle-btn:active { opacity: 1; }

  /* ── Toolbar visibility ── */
  body.toolbar-hidden #toolbar { display: none; }

  /* ── Responsive ── */
  @media (max-width: 400px) {
    button { height: 34px; font-size: 11px; }
    .toolbar-row { gap: 3px; padding: 3px; }
  }
</style>

<body>

<div id="terminal-container">
  <button id="toggle-btn" title="Toggle toolbar">&#x2630;</button>
</div>

<div id="toolbar" data-mode="keys">
  <!-- Special-keys mode: base layer -->
  <div class="toolbar-row keys-row layer-base">
    <button data-key="esc" title="Escape">Esc</button>
    <button data-key="tab" title="Tab">Tab</button>
    <button data-key="backtick" data-shift="~" title="Backtick (Shift = ~)">`</button>
    <button data-key="dash" data-shift="_" title="Dash (Shift = _)">-</button>
    <button data-key="backslash" data-shift="|" title="Backslash (Shift = |)">\</button>
    <button data-key="quote" data-shift="&quot;" title="Quote (Shift = &quot;)">'</button>
    <button data-key="slash" data-shift="?" title="Slash (Shift = ?)">/</button>
    <button data-key="del" title="Delete">Del</button>
    <button data-key="enter" class="accent" title="Enter">&#x23CE;</button>
  </div>
  <div class="toolbar-row keys-row layer-base">
    <button data-action="fn" title="F1-F12 layer">Fn</button>
    <button data-mod="shift" title="Shift (one-shot)">Shift</button>
    <button data-mod="ctrl" title="Ctrl (one-shot)">Ctrl</button>
    <button data-mod="meta" title="Meta (one-shot)">Win</button>
    <button data-mod="alt" title="Alt (one-shot)">Alt</button>
    <button data-key="home" title="Home">Home</button>
    <button data-key="end" title="End">End</button>
    <button data-key="pgup" title="Page Up">PgUp</button>
    <button data-key="pgdn" title="Page Down">PgDn</button>
  </div>
  <!-- Special-keys mode: Fn layer -->
  <div class="toolbar-row keys-row layer-fn">
    <button data-key="f1">F1</button>
    <button data-key="f2">F2</button>
    <button data-key="f3">F3</button>
    <button data-key="f4">F4</button>
    <button data-key="f5">F5</button>
    <button data-key="f6">F6</button>
  </div>
  <div class="toolbar-row keys-row layer-fn">
    <button data-action="fn" class="on" title="Back to base keys">Fn</button>
    <button data-key="f7">F7</button>
    <button data-key="f8">F8</button>
    <button data-key="f9">F9</button>
    <button data-key="f10">F10</button>
    <button data-key="f11">F11</button>
    <button data-key="f12">F12</button>
  </div>
  <!-- Bottom persistent row: mode content (left) + cluster (right) -->
  <div class="toolbar-row" id="row-bottom">
    <div id="mode-area">
      <div class="mode-pane" data-pane="keys">
        <button data-key="left" title="Left">&#x25C0;</button>
        <button data-key="up" title="Up">&#x25B2;</button>
        <button data-key="down" title="Down">&#x25BC;</button>
        <button data-key="right" title="Right">&#x25B6;</button>
      </div>
      <div class="mode-pane" data-pane="settings">
        <button id="font-minus" title="Decrease font size">A&#x2212;</button>
        <span class="font-display" id="font-label">14</span>
        <button id="font-plus" title="Increase font size">A+</button>
        <span class="sep"></span>
        <button id="restart-btn" class="danger" title="Restart terminal">&#x27F3; 재시작</button>
      </div>
      <div class="mode-pane" data-pane="select">
        <button id="sel-all" title="Select all">전체</button>
        <button id="sel-copy" title="Copy selection">복사</button>
        <button id="sel-paste" title="Paste">붙여넣기</button>
        <button id="sel-clear" title="Clear selection">해제</button>
      </div>
    </div>
    <div id="cluster">
      <button id="select-btn" title="Text selection mode">&#x2336;</button>
      <button id="settings-btn" title="Settings mode">&#x2699;</button>
      <button id="kb-btn" title="Toggle on-screen keyboard">&#x2328;</button>
      <span id="status">●</span>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ── ttyd protocol constants ────────────────────────────
  const CMD_INPUT  = '0';
  const CMD_RESIZE = '1';
  const CMD_PAUSE  = '2';
  const CMD_RESUME = '3';

  const SVR_OUTPUT        = 0x30; // '0'
  const SVR_WINDOW_TITLE  = 0x31; // '1'
  const SVR_PREFERENCES   = 0x32; // '2'

  const encoder = new TextEncoder();
  const decoder = new TextDecoder();

  // ── Font size persistence ─────────────────────────────
  const FONT_SIZES = [10, 11, 12, 13, 14, 15, 16, 18, 20, 22, 24, 28, 32];
  const FONT_KEY = 'ttyd-wrapper.fontSize';
  let initialFontSize = 14;
  try {
    const saved = parseInt(localStorage.getItem(FONT_KEY), 10);
    if (FONT_SIZES.includes(saved)) initialFontSize = saved;
  } catch (_) { /* storage unavailable */ }

  // ── Mobile detection (Android / iOS / iPadOS only) ────
  // iPadOS 13+ masquerades as macOS in the UA; multi-touch exposes it.
  const IS_MOBILE = /Android|iPhone|iPod|iPad/i.test(navigator.userAgent)
    || (/Mac/i.test(navigator.userAgent) && navigator.maxTouchPoints > 1);

  // ── Terminal ──────────────────────────────────────────
  const term = new Terminal({
    fontSize: initialFontSize,
    fontFamily: 'Consolas, "Courier New", "D2Coding", monospace',
    cursorBlink: true,
    cursorStyle: 'bar',
    scrollback: 5000,
    theme: {
      background: '#0d0d19',
      foreground: '#e0e0e0',
      cursor: '#5b9bd5',
      selectionBackground: '#3a3a8a80',
      black:   '#1a1a2e',
      red:     '#e74c3c',
      green:   '#2ecc71',
      yellow:  '#f1c40f',
      blue:    '#5b9bd5',
      magenta: '#9b59b6',
      cyan:    '#1abc9c',
      white:   '#e0e0e0',
      brightBlack:   '#3d3d5c',
      brightRed:     '#ff6b6b',
      brightGreen:   '#69f0ae',
      brightYellow:  '#fff176',
      brightBlue:    '#82b1ff',
      brightMagenta: '#ea80fc',
      brightCyan:    '#84ffff',
      brightWhite:   '#ffffff',
    },
  });

  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.loadAddon(new WebLinksAddon.WebLinksAddon());

  const container = document.getElementById('terminal-container');
  term.open(container);
  // Focus at load only on desktop. On mobile, programmatic focus cannot
  // summon the IME (needs a user gesture), which leaves "focused but
  // keyboard hidden" - the kb button's focus-based toggle then wastes its
  // first tap on a no-op blur.
  if (!IS_MOBILE) term.focus();
  // Tap terminal area to focus
  container.addEventListener('click', () => term.focus());
  // Delay initial fit until layout is done
  requestAnimationFrame(() => {
    fitAddon.fit();
    sendResize();
  });

  // ── WebSocket ──────────────────────────────────────────
  const statusEl = document.getElementById('status');
  let socket = null;
  let token = '';
  let reconnectTimer = null;
  let reconnectDelay = 1000;
  const MAX_RECONNECT_DELAY = 10000;

  async function refreshToken() {
    try {
      const resp = await fetch('token');
      if (resp.ok) {
        token = (await resp.json()).token || '';
      }
    } catch (_) { /* no auth configured */ }
  }

  function setStatus(state) {
    statusEl.className = state;
    statusEl.textContent = state === 'connected' ? '●' : '○';
  }

  async function connect() {
    if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) {
      return;
    }

    setStatus('disconnected');
    await refreshToken();
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = protocol + '//' + location.host + '/ws';

    try {
      socket = new WebSocket(wsUrl, ['tty']);
      socket.binaryType = 'arraybuffer';

      socket.onopen = () => {
        setStatus('connected');
        reconnectDelay = 1000;
        // ttyd handshake: first message MUST be raw JSON (spawns the PTY process)
        socket.send(encoder.encode(JSON.stringify({
          AuthToken: token,
          columns: term.cols,
          rows: term.rows,
        })));
        term.reset();
        if (!IS_MOBILE) term.focus();
      };

      socket.onmessage = (event) => {
        if (!(event.data instanceof ArrayBuffer)) return;
        const bytes = new Uint8Array(event.data);
        if (bytes.length === 0) return;

        const cmd = bytes[0];
        const payload = bytes.subarray(1);

        switch (cmd) {
          case SVR_OUTPUT: // '0' — terminal output
            term.write(payload);
            break;
          case SVR_WINDOW_TITLE: // '1' — window title
            document.title = decoder.decode(payload);
            break;
          case SVR_PREFERENCES: // '2' — client preferences
            try {
              const prefs = JSON.parse(decoder.decode(payload));
              if (prefs.fontSize) setFontSize(prefs.fontSize);
              if (prefs.fontFamily) term.options.fontFamily = prefs.fontFamily;
              if (prefs.platform) {
                applyPlatform(prefs.platform);
                try { localStorage.setItem(PLATFORM_KEY, prefs.platform); } catch (_) { /* ignore */ }
              }
            } catch (_) { /* ignore */ }
            break;
          default:
            console.warn('[ttyd] unknown server command:', cmd);
        }
      };

      socket.onclose = () => {
        setStatus('disconnected');
        scheduleReconnect();
      };

      socket.onerror = () => {
        // onclose fires after this
      };

    } catch (e) {
      scheduleReconnect();
    }
  }

  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      reconnectDelay = Math.min(reconnectDelay * 1.5, MAX_RECONNECT_DELAY);
      connect();
    }, reconnectDelay);
  }

  function sendInput(data) {
    if (!socket || socket.readyState !== WebSocket.OPEN) return;
    if (typeof data === 'string') {
      // Encode as: '0' prefix + UTF-8 bytes
      const encoded = encoder.encode(data);
      const msg = new Uint8Array(1 + encoded.length);
      msg[0] = CMD_INPUT.charCodeAt(0); // '0' = 0x30
      msg.set(encoded, 1);
      socket.send(msg);
    } else {
      // Binary data — Uint8Array
      const msg = new Uint8Array(1 + data.length);
      msg[0] = CMD_INPUT.charCodeAt(0);
      msg.set(data, 1);
      socket.send(msg);
    }
  }

  function sendResize() {
    if (!socket || socket.readyState !== WebSocket.OPEN) return;
    const json = JSON.stringify({ columns: term.cols, rows: term.rows });
    const encoded = encoder.encode(CMD_RESIZE + json); // '1' + JSON
    socket.send(encoded);
  }

  // ── Terminal input → WebSocket ─────────────────────────
  // Sticky-modifier interception: a single ASCII char gets the armed
  // modifiers applied and consumes them; multi-char data (Korean IME
  // composition, autocomplete, paste) passes through and keeps them.
  term.onData((data) => {
    if (anySticky() && data.length === 1 && data.charCodeAt(0) < 0x80) {
      sendInput(applyModsToChar(data, consumeSticky()));
      return;
    }
    sendInput(data);
  });

  // ── Resize handling ────────────────────────────────────
  function handleResize() {
    fitAddon.fit();
    sendResize();
  }

  new ResizeObserver(handleResize).observe(container);
  window.addEventListener('resize', handleResize);

  // ── Font size ──────────────────────────────────────────
  const fontLabel = document.getElementById('font-label');
  let fontSizeIdx = FONT_SIZES.indexOf(initialFontSize);
  fontLabel.textContent = initialFontSize;

  function setFontSize(size) {
    term.options.fontSize = size;
    fontLabel.textContent = size;
    const idx = FONT_SIZES.indexOf(size);
    if (idx !== -1) fontSizeIdx = idx;
    try { localStorage.setItem(FONT_KEY, size); } catch (_) { /* ignore */ }
    requestAnimationFrame(() => fitAddon.fit());
  }

  function adjustFont(delta) {
    const idx = Math.max(0, Math.min(FONT_SIZES.length - 1, fontSizeIdx + delta));
    if (idx !== fontSizeIdx) {
      fontSizeIdx = idx;
      setFontSize(FONT_SIZES[idx]);
    }
  }

  document.getElementById('font-minus').addEventListener('click', () => adjustFont(-1));
  document.getElementById('font-plus').addEventListener('click', () => adjustFont(1));

  // ── Toolbar: special keys ──────────────────────────────
  const toolbar = document.getElementById('toolbar');

  // CSI modifier code: 1 + Shift(1) + Alt(2) + Ctrl(4) + Meta(8)
  function modCode(m) {
    return 1 + (m.shift ? 1 : 0) + (m.alt ? 2 : 0) + (m.ctrl ? 4 : 0) + (m.meta ? 8 : 0);
  }
  function csiMod(param, final, m) {
    const c = modCode(m);
    return c === 1
      ? '\x1b[' + param + final
      : '\x1b[' + (param || '1') + ';' + c + final;
  }
  function fnLow(final) { // F1-F4: SS3 plain, CSI form when modified
    return (m) => {
      const c = modCode(m);
      return c === 1 ? '\x1bO' + final : '\x1b[1;' + c + final;
    };
  }

  const KEYDEFS = {
    esc:       () => '\x1b',
    backtick:  (m) => m.shift ? '~' : '`',
    backslash: (m) => m.shift ? '|' : '\\',
    slash:     (m) => m.shift ? '?' : '/',
    dash:      (m) => m.shift ? '_' : '-',
    quote:     (m) => m.shift ? '"' : "'",
    tab:       (m) => m.shift ? '\x1b[Z' : '\x09',
    enter:     () => '\x0d',
    up:    (m) => csiMod('', 'A', m),
    down:  (m) => csiMod('', 'B', m),
    right: (m) => csiMod('', 'C', m),
    left:  (m) => csiMod('', 'D', m),
    home:  (m) => csiMod('', 'H', m),
    end:   (m) => csiMod('', 'F', m),
    del:   (m) => csiMod('3', '~', m),
    pgup:  (m) => csiMod('5', '~', m),
    pgdn:  (m) => csiMod('6', '~', m),
    f1: fnLow('P'), f2: fnLow('Q'), f3: fnLow('R'), f4: fnLow('S'),
    f5:  (m) => csiMod('15', '~', m),
    f6:  (m) => csiMod('17', '~', m),
    f7:  (m) => csiMod('18', '~', m),
    f8:  (m) => csiMod('19', '~', m),
    f9:  (m) => csiMod('20', '~', m),
    f10: (m) => csiMod('21', '~', m),
    f11: (m) => csiMod('23', '~', m),
    f12: (m) => csiMod('24', '~', m),
  };

  // ── Sticky modifiers (one-shot) ────────────────────────
  const sticky = { ctrl: false, alt: false, shift: false, meta: false };

  function anySticky() {
    return sticky.ctrl || sticky.alt || sticky.shift || sticky.meta;
  }
  function updateModButtons() {
    toolbar.querySelectorAll('button[data-mod]').forEach((b) => {
      b.classList.toggle('active', sticky[b.dataset.mod]);
    });
    // Shift preview: symbol keys show their shifted glyph while Shift is armed
    toolbar.querySelectorAll('button[data-shift]').forEach((b) => {
      if (b.dataset.base === undefined) b.dataset.base = b.textContent;
      b.textContent = sticky.shift ? b.dataset.shift : b.dataset.base;
    });
  }
  function clearSticky() {
    sticky.ctrl = sticky.alt = sticky.shift = sticky.meta = false;
    updateModButtons();
  }
  function consumeSticky() {
    const m = { ctrl: sticky.ctrl, alt: sticky.alt, shift: sticky.shift, meta: sticky.meta };
    clearSticky();
    return m;
  }

  // Apply armed modifiers to a single typed ASCII char.
  function applyModsToChar(ch, m) {
    const code = ch.charCodeAt(0);
    if (code === 0x09) { // Tab from physical keyboard
      const t = m.shift ? '\x1b[Z' : '\x09';
      return m.alt ? '\x1b' + t : t;
    }
    if (code === 0x7f) { // Backspace
      const b = m.ctrl ? '\x08' : '\x7f';
      return m.alt ? '\x1b' + b : b;
    }
    if (code < 0x20) return m.alt ? '\x1b' + ch : ch; // other control chars
    let out = m.shift ? ch.toUpperCase() : ch;
    if (m.ctrl) {
      const u = out.toUpperCase().charCodeAt(0);
      if (out === ' ') out = '\x00';
      else if (u >= 0x3f && u <= 0x7e) out = String.fromCharCode(u & 0x1f);
    }
    return m.alt ? '\x1b' + out : out;
  }

  // ── Fn layer ───────────────────────────────────────────
  let fnActive = false;
  function setFnLayer(on) {
    fnActive = on;
    toolbar.classList.toggle('fn-layer', on);
    clearSticky();
  }

  // ── Toolbar wiring (delegated) ─────────────────────────
  // pointerdown preventDefault keeps the terminal textarea focused,
  // so the mobile IME stays open while tapping toolbar keys.
  toolbar.addEventListener('pointerdown', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    e.preventDefault();
    btn.classList.add('pressed');
  });
  ['pointerup', 'pointercancel', 'pointerleave'].forEach((ev) => {
    toolbar.addEventListener(ev, (e) => {
      const btn = e.target.closest('button');
      if (btn) btn.classList.remove('pressed');
    }, true);
  });

  toolbar.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    e.preventDefault();
    if (btn.dataset.key) {
      sendInput(KEYDEFS[btn.dataset.key](consumeSticky()));
    } else if (btn.dataset.mod) {
      sticky[btn.dataset.mod] = !sticky[btn.dataset.mod];
      updateModButtons();
    } else if (btn.dataset.action === 'fn') {
      setFnLayer(!fnActive);
    }
  });

  // ── Modes ──────────────────────────────────────────────
  const settingsBtn = document.getElementById('settings-btn');
  const selectBtn = document.getElementById('select-btn');
  let mode = 'keys';

  function setMode(next) {
    const leaving = mode;
    mode = next;
    toolbar.dataset.mode = mode;
    setFnLayer(false);
    settingsBtn.classList.toggle('on', mode === 'settings');
    selectBtn.classList.toggle('on', mode === 'select');
    if (leaving === 'select' && mode !== 'select') {
      if (gesture && gesture.kind === 'select') gesture = null;
      term.clearSelection();
    }
    requestAnimationFrame(() => fitAddon.fit());
  }

  settingsBtn.addEventListener('click', () => setMode(mode === 'settings' ? 'keys' : 'settings'));
  selectBtn.addEventListener('click', () => setMode(mode === 'select' ? 'keys' : 'select'));

  // ── Touch gestures (unified pointer controller) ────────
  // xterm's internal touch scrolling only works off the glyph rows and
  // fights the browser's text-selection gestures on the DOM renderer.
  // Own every touch over the terminal at the capture stage instead:
  //   normal modes: 1-finger drag anywhere = line scroll, tap = focus
  //   select mode:  1-finger drag = cell selection (2nd finger → scroll)
  // setPointerCapture routes all moves here; the browser cannot steal
  // the gesture mid-drag (the old touch-event version lost it after a
  // long-press/gesture arbitration, leaving a one-cell selection).
  let gesture = null; // { id, kind, lastY, acc, cellH, startX, startY, t0, anchor }

  function screenRect() {
    const screen = container.querySelector('.xterm-screen');
    return (screen || container).getBoundingClientRect();
  }
  function cellFromPoint(x, y) {
    const r = screenRect();
    const col = Math.max(0, Math.min(term.cols - 1, Math.floor((x - r.left) / (r.width / term.cols))));
    const row = Math.max(0, Math.min(term.rows - 1, Math.floor((y - r.top) / (r.height / term.rows))));
    return { col: col, row: row };
  }
  function applyTouchSelection(a, b) {
    let s = a, e = b;
    if (b.row < a.row || (b.row === a.row && b.col < a.col)) { s = b; e = a; }
    const length = (e.row - s.row) * term.cols + (e.col - s.col) + 1;
    term.select(s.col, s.row + term.buffer.active.viewportY, length);
  }

  container.addEventListener('pointerdown', (e) => {
    if (e.pointerType === 'mouse') return;            // desktop: native xterm behavior
    if (e.target.closest && e.target.closest('#toggle-btn')) return;
    if (gesture) {
      // Second finger while selecting: freeze selection, switch to scroll
      if (gesture.kind === 'select') { gesture.kind = 'scroll'; gesture.anchor = null; }
      return;
    }
    e.preventDefault(); // no synthesized mouse events, no native gesture
    const r = screenRect();
    gesture = {
      id: e.pointerId,
      kind: mode === 'select' ? 'select' : 'scroll',
      lastY: e.clientY,
      acc: 0,
      cellH: r.height / term.rows,
      startX: e.clientX,
      startY: e.clientY,
      t0: Date.now(),
      anchor: null,
    };
    if (gesture.kind === 'select') {
      gesture.anchor = cellFromPoint(e.clientX, e.clientY);
      applyTouchSelection(gesture.anchor, gesture.anchor);
    }
    try { container.setPointerCapture(e.pointerId); } catch (_) { /* ignore */ }
  }, true);

  container.addEventListener('pointermove', (e) => {
    if (!gesture || e.pointerId !== gesture.id) return;
    if (gesture.kind === 'select') {
      applyTouchSelection(gesture.anchor, cellFromPoint(e.clientX, e.clientY));
    } else {
      gesture.acc += gesture.lastY - e.clientY; // finger up = scroll down
      const lines = Math.trunc(gesture.acc / gesture.cellH);
      if (lines !== 0) {
        term.scrollLines(lines);
        gesture.acc -= lines * gesture.cellH;
      }
      gesture.lastY = e.clientY;
    }
  }, true);

  function endGesture(e) {
    if (!gesture || e.pointerId !== gesture.id) return;
    const tap = gesture.kind === 'scroll'
      && Math.abs(e.clientX - gesture.startX) < 10
      && Math.abs(e.clientY - gesture.startY) < 10
      && Date.now() - gesture.t0 < 350;
    gesture = null;
    if (tap) term.focus(); // pointerdown preventDefault suppressed native focus
  }
  container.addEventListener('pointerup', endGesture, true);
  container.addEventListener('pointercancel', endGesture, true);

  // Swallow raw touch events so xterm's internal touch scrolling and
  // browser fallback gestures never double-handle the pointer gestures.
  ['touchstart', 'touchmove'].forEach((ev) => {
    container.addEventListener(ev, (e) => {
      if (e.target.closest && e.target.closest('#toggle-btn')) return;
      e.stopPropagation();
      if (e.cancelable) e.preventDefault();
    }, { capture: true, passive: false });
  });

  // ── Clipboard ──────────────────────────────────────────
  async function copySelection() {
    const selection = term.getSelection();
    if (!selection) return;
    try {
      await navigator.clipboard.writeText(selection);
    } catch (_) {
      const ta = document.createElement('textarea');
      ta.value = selection;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
  }

  document.getElementById('sel-all').addEventListener('click', () => term.selectAll());
  document.getElementById('sel-copy').addEventListener('click', copySelection);
  document.getElementById('sel-paste').addEventListener('click', async () => {
    try {
      const text = await navigator.clipboard.readText();
      sendInput(text);
    } catch (_) {
      // Clipboard API not available
    }
  });
  document.getElementById('sel-clear').addEventListener('click', () => term.clearSelection());

  // ── Keyboard open/close ────────────────────────────────
  const kbBtn = document.getElementById('kb-btn');
  kbBtn.addEventListener('click', () => {
    const ta = term.textarea;
    if (!ta) return;
    if (document.activeElement === ta) ta.blur();
    else term.focus();
  });

  // ── Terminal restart ───────────────────────────────────
  const restartBtn = document.getElementById('restart-btn');
  const RESTART_LABEL = '\u27F3 재시작';
  let restartArm = null;

  restartBtn.addEventListener('click', () => {
    if (restartArm) {
      clearTimeout(restartArm);
      restartArm = null;
      restartBtn.textContent = RESTART_LABEL;
      restartTerminal();
    } else {
      restartBtn.textContent = '확인?';
      restartArm = setTimeout(() => {
        restartArm = null;
        restartBtn.textContent = RESTART_LABEL;
      }, 2000);
    }
  });

  function restartTerminal() {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    reconnectDelay = 1000;
    if (socket) {
      socket.onclose = null; // suppress backoff reconnect
      try { socket.close(); } catch (_) { /* already closed */ }
      socket = null;
    }
    term.reset();
    connect();
  }

  // ── Server-OS modifier labels ──────────────────────────
  const PLATFORM_KEY = 'ttyd-wrapper.platform';
  const MOD_LABELS = {
    windows: { alt: 'Alt', meta: 'Win' },
    linux:   { alt: 'Alt', meta: 'Super' },
    macos:   { alt: '\u2325', meta: '\u2318' },
  };
  function applyPlatform(p) {
    const labels = MOD_LABELS[p] || MOD_LABELS.windows;
    const alt = toolbar.querySelector('button[data-mod="alt"]');
    const meta = toolbar.querySelector('button[data-mod="meta"]');
    alt.textContent = labels.alt;
    meta.textContent = labels.meta;
    // Physical bottom-row order: Win/Linux = Ctrl·Meta·Alt, macOS = Ctrl·Option·Command
    if (p === 'macos') meta.before(alt);
    else alt.before(meta);
  }
  let cachedPlatform = null;
  try { cachedPlatform = localStorage.getItem(PLATFORM_KEY); } catch (_) { /* ignore */ }
  if (cachedPlatform) applyPlatform(cachedPlatform);

  // ── Toolbar toggle ─────────────────────────────────────
  // Mobile: toolbar shown by default. Desktop: hidden until ☰.
  const toggleBtn = document.getElementById('toggle-btn');
  let toolbarVisible = IS_MOBILE;
  document.body.classList.toggle('toolbar-hidden', !toolbarVisible);
  if (!IS_MOBILE) document.body.classList.add('no-mobile');

  toggleBtn.addEventListener('click', () => {
    toolbarVisible = !toolbarVisible;
    document.body.classList.toggle('toolbar-hidden', !toolbarVisible);
    requestAnimationFrame(() => fitAddon.fit());
  });

  // ── Soft keyboard handling ────────────────────────────
  // Android Chrome 108+: interactive-widget=resizes-content (viewport meta)
  // shrinks the layout viewport natively, so flex layout adapts by itself.
  // iOS Safari: the keyboard only shrinks the VISUAL viewport - the layout
  // viewport (and 100dvh) stays full-height, covering the toolbar. Pin the
  // body to visualViewport.height while the keyboard is open.
  if (window.visualViewport) {
    const vv = window.visualViewport;
    const onViewportChange = () => {
      const keyboardOpen = vv.height < window.innerHeight - 1;
      kbBtn.classList.toggle('on', keyboardOpen);
      document.body.style.height = keyboardOpen ? vv.height + 'px' : '';
      window.scrollTo(0, 0);
      requestAnimationFrame(() => fitAddon.fit());
    };
    vv.addEventListener('resize', onViewportChange);
    vv.addEventListener('scroll', onViewportChange);
  }

  // ── Init ───────────────────────────────────────────────
  connect();

  // Expose for debugging
  window._term = term;
  window._sendInput = sendInput;
})();
</script>
</body>
</html>
